# LIVING ROOM

id: living-room
name: "Living Room with Kitchen"
area_m2: 25.2  # official

ascii: |
  #      N
  #      ↑
  #    D─────────────C
  #    │             │
  #    │   Living    │
  #    │             │
  #    │      +──E   │
  #    │      │      │
  #    │      │ Kit  │
  #    A──────F──────B

walls:
  - id: A-B
    direction: east
    length: 560

  - id: B-C
    direction: north
    length: 490

  - id: C-D
    direction: west
    length: 560

  - id: D-A
    direction: south
    length: 490

validation:
  trace_closes: true
  calculated_area: 27.44
  area_difference_pct: 8.9
  area_matches: false  # Note: kitchen nook excluded from official 25.2m²

# Adjusted: The room is actually a partial L-shape. Kitchen alcove is counted
# separately in some floor plans. Using simple rectangle for demo purposes.
# In a real project, model the exact shape with more walls.

ceiling_height: 260

design:
  goal: "Warm Mediterranean living — calm beige/white base with walnut + linen textures, one statement pendant."
  objectives:
    - "60-30-10: white walls/tile + beige textiles (60%), walnut + terracotta (30%), brass accents (10%)"
    - "Sofa zone faces south for light + balcony views"
    - "Dining for 4 near kitchen, not blocking circulation"
    - "Layered lighting: pendant over dining + floor lamp at sofa + under-cabinet kitchen"
    - "Rug to warm the tile floor and anchor the sofa zone"
    - "Keep paths clear: entry → balcony, kitchen → dining"

built_ins:
  - id: kitchen-cabinets
    wall: A-B
    position: 280   # kitchen starts at midpoint of south wall
    length: 280     # to point B
    depth: 60
    description: |
      White laminate base + wall cabinets. Countertop runs along south wall
      eastern half. Includes sink, 2-burner hob, small fridge.

windows:
  - id: balcony-door
    wall: D-A
    position: 100
    width: 180
    type: sliding-door
    notes: "South-facing balcony access, main natural light source"

  - id: kitchen-window
    wall: A-B
    position: 400
    width: 100
    notes: "Small window above kitchen counter"

openings:
  - id: hall-entry
    wall: C-D
    position: 420
    width: 80
    to: hall
    has_door: true

outlets:
  - id: outlet-sw
    wall: D-A
    position: 30
    height: 30
    type: double

  - id: outlet-sofa
    wall: B-C
    position: 200
    height: 30
    type: double

  - id: outlet-tv
    wall: D-A
    position: 240
    height: 100
    type: double

  - id: outlet-kitchen
    wall: A-B
    position: 350
    height: 110
    type: double

heating: []
plumbing: []

lighting:
  - id: dining-pendant
    position:
      wall: [C-D, D-A]
      offset: [155, 170]
    ceiling: main
    mount: pendant
    fixture: registry/furniture/pendant-lamp.yaml
    why: "Statement piece over dining table, warm brass tone."

  - id: kitchen-spots
    position:
      wall: [B-C, A-B]
      offset: [150, 60]
    ceiling: main
    mount: recessed
    fixture: null
    why: "Functional lighting over kitchen counter"

furniture:
  - id: sofa
    registry: registry/furniture/sofa.yaml
    position:
      wall: [B-C, A-B]
      offset: [15, 370]
    facing: west
    why: "Against east wall, faces balcony for natural light and views"

  - id: coffee-table
    registry: registry/furniture/coffee-table.yaml
    position:
      wall: [B-C, A-B]
      offset: [230, 200]
    orientation: N-S
    why: "Centered in front of sofa, easy reach from seating"

  - id: dining-table
    registry: registry/furniture/dining-table.yaml
    position:
      wall: [C-D, D-A]
      offset: [160, 130]
    orientation: N-S
    why: "Near kitchen zone, under pendant, seats 4"

  - id: dining-chair-1
    registry: registry/furniture/dining-chair.yaml
    position:
      wall: [C-D, D-A]
      offset: [100, 70]
    facing: east
    why: "West side of table"

  - id: dining-chair-2
    registry: registry/furniture/dining-chair.yaml
    position:
      wall: [C-D, D-A]
      offset: [165, 70]
    facing: east
    why: "West side of table"

  - id: dining-chair-3
    registry: registry/furniture/dining-chair.yaml
    position:
      wall: [C-D, D-A]
      offset: [100, 215]
    facing: west
    why: "East side of table"

  - id: dining-chair-4
    registry: registry/furniture/dining-chair.yaml
    position:
      wall: [C-D, D-A]
      offset: [165, 215]
    facing: west
    why: "East side of table"

  - id: floor-lamp
    registry: registry/furniture/floor-lamp.yaml
    position:
      wall: [B-C, A-B]
      offset: [50, 400]
    orientation: E-W
    uses_outlet: outlet-sofa
    why: "Next to sofa, warm reading light for evenings"

  - id: tv
    registry: registry/furniture/tv.yaml
    position:
      wall: [D-A, A-B]
      offset: [0, 220]
    facing: east
    mount: wall
    height: 120
    uses_outlet: outlet-tv
    why: "West wall opposite sofa, wall-mounted to save floor space"

accessories:
  - id: living-rug
    type: area-rug
    location: "Under coffee table, extending to sofa front legs"
    notes: "Natural jute or wool, ~200x300cm, warm tone to offset white tile"

  - id: balcony-plants
    type: plants
    location: "Flanking balcony door"
    notes: "2 tall plants in terracotta pots"

notes: |
  Kitchen occupies SE quarter of the room (behind kitchen-cabinets).
  Main living zone is the NW area with sofa + coffee table.
  Dining bridges the two zones.
