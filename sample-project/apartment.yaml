# APARTMENT

address: "Calle Ejemplo 12, 3ºB"
municipality: "Málaga"
floor: 3
total_area_m2: 58
building_year: 2005
orientation: "south"

location: |
  Central Málaga, 10 min walk to the beach. Quiet residential street.
  South-facing balcony from living room.

building: |
  Modern 4-storey residential block. White exterior, terracotta accents.
  Shared rooftop terrace. Elevator.

character: |
  Bright, south-facing apartment with good natural light.
  Open-plan living/kitchen. Simple finishes but good bones.

challenges: |
  - Small total area requires careful space planning
  - White tile floors are cold — need rugs/textiles for warmth
  - Built-in kitchen is basic — can't change but can style around it

specifications: |
  Floors: White ceramic tile (60x60cm) throughout
  Walls: White paint
  Doors: White hollow-core, standard 80cm
  Windows: Aluminum frame, double glazed
  Electrical: Standard Spanish (Schuko), 230V
  Internet: Fiber optic available

# -----------------------------------------------------------
# LAYOUT
# -----------------------------------------------------------

layout:
  ascii: |
    N
    ↑   +-----------+--------+
        |           |bedroom |
        | living    |        |
        | room      +--+  +--+
        |           |hall|
        |    +------+----+
        |    |kitchen     |
        +----+------------+

  adjacencies:
    - rooms: [living-room, bedroom]
      shared_wall:
        living-room: C-D
        bedroom: A-B
      thickness: 12
      notes: "Living room north wall = bedroom south wall"

    - rooms: [living-room, hall]
      shared_wall:
        living-room: D-E
        hall: C-D
      connection: open
      notes: "Open passage between hall and living room"

# -----------------------------------------------------------
# ROOMS
# -----------------------------------------------------------

rooms:
  - id: living-room
    file: rooms/living-room.yaml
    area_m2: 25.2

  - id: bedroom
    file: rooms/bedroom.yaml
    area_m2: 12.5
